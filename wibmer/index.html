  <script type="application/ld+json">
  {
    "@context": "https://schema.org",

    "address": {
      "@type": "PostalAddress",
      "streetAddress": "Kaltenhaus 19, 9971 Matrei in Osttirol, Austria",
      "addressRegion": "Austria",
      "addressCountry": "AT"
    },
    "telephone": "+43 4875 6657",
    "openingHours": "Montag bis Donnerstag von 08 bis 12 Uhr und 13 bis 17 Uhr, Freitag von 08 bis 12 Uhr",
    "url": "https://www.wibmer-tischlerei.at/",
    "knowsAbout": ["Tischlerarbeiten", "Maßanfertigung", "Austria"]
  }
  </script>

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "Wie kann ich einen Termin vereinbaren?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Sie können uns telefonisch unter +43 4875 6657 oder per E-Mail an wibmer@coop-holz.at erreichen. Unsere Bürozeiten sind Montag bis Donnerstag von 08 bis 12 Uhr und 13 bis 17 Uhr sowie Freitag von 08 bis 12 Uhr. Gerne vereinbaren wir einen persönlichen Beratungstermin in unserem Betrieb in Matrei in Osttirol."
        }
      },
      {
        "@type": "Question",
        "name": "Welche Leistungen bieten Sie an?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Wibmer Tischlerei ist Ihr Komplettanbieter für Planungs- und Tischlerarbeiten. Wir fertigen individuelle Küchen, Bäder, Garderoben und Einrichtungsmöbel nach Maß. Zusätzlich handeln wir mit hochwertigen Böden, Fenstern und Türen. Durch unsere Vernetzung mit Partnern aus unterschiedlichen Gewerken bieten wir Ihnen eine umfassende Raumgestaltung aus einer Hand."
        }
      },
      {
        "@type": "Question",
        "name": "Wo sind Sie tätig?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Unser Betrieb befindet sich in Kaltenhaus 19, 9971 Matrei in Osttirol, Austria. Wir sind in ganz Tirol und darüber hinaus für unsere Kunden tätig. Zu unseren Referenzprojekten zählen unter anderem das Geschäftslokal Friseur 'Lockvogel', die Hotelausstattung Hotel Eggerwirt in Söll sowie das Designhaus COOP."
        }
      }
    ]
  }
  </script>

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #1a1a1a;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --light: #f8f7f4;
      --mid: #e8e4dd;
      --text: #2d2d2d;
      --text-light: #6b6560;
      --white: #ffffff;
      --radius: 6px;
      --shadow: 0 4px 24px rgba(26,26,26,0.10);
      --shadow-lg: 0 8px 40px rgba(26,26,26,0.16);
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Source Sans 3', sans-serif;
      color: var(--text);
      background: var(--white);
      line-height: 1.65;
      font-size: 16px;
    }

    h1, h2, h3 {
      font-family: 'Playfair Display', serif;
      line-height: 1.2;
    }

    img {
      max-width: 100%;
      height: auto;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .container {
      width: 100%;
      max-width: 1140px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* ===================== HEADER / NAV ===================== */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: var(--white);
      border-bottom: 1px solid var(--mid);
      box-shadow: 0 2px 12px rgba(26,26,26,0.07);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      text-decoration: none;
      display: flex;
      gap: 0.2em;
    }

    .logo-word1 {
      color: var(--primary);
    }

    .logo-word2 {
      color: var(--accent);
    }

    .nav-links {
      display: none;
      list-style: none;
      gap: 28px;
      align-items: center;
    }

    .nav-links li a {
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links li a:hover {
      color: var(--accent);
    }

    .nav-cta {
      background: var(--accent);
      color: var(--white) !important;
      padding: 10px 20px;
      border-radius: var(--radius);
      transition: background 0.2s !important;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
    }

    .nav-cta:hover {
      background: var(--accent-dark) !important;
      text-decoration: none !important;
    }

    .nav-hamburger {
      display: flex;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      background: none;
      border: none;
      padding: 8px;
    }

    .nav-hamburger span {
      display: block;
      width: 26px;
      height: 2px;
      background: var(--primary);
      border-radius: 2px;
      transition: all 0.3s;
    }

    .mobile-nav {
      display: none;
      flex-direction: column;
      background: var(--white);
      border-top: 1px solid var(--mid);
      padding: 16px 20px 20px;
      gap: 12px;
    }

    .mobile-nav.open {
      display: flex;
    }

    .mobile-nav a {
      color: var(--text);
      font-size: 1rem;
      font-weight: 600;
      padding: 10px 0;
      border-bottom: 1px solid var(--mid);
      text-decoration: none;
    }

    .mobile-nav a:last-child {
      border-bottom: none;
    }

    .mobile-nav .mobile-cta {
      background: var(--accent);
      color: var(--white);
      text-align: center;
      padding: 13px 20px;
      border-radius: var(--radius);
      border-bottom: none !important;
      margin-top: 6px;
    }

    /* ===================== HERO ===================== */
    .hero {
      background: linear-gradient(135deg, #1a1a1a 0%, #2d2523 60%, #1a1a1a 100%);
      color: var(--white);
      padding: 80px 0 70px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('https://source.unsplash.com/1600x900/?wood,carpentry,interior') center/cover no-repeat;
      opacity: 0.15;
    }

    .hero-inner {
      position: relative;
      z-index: 2;
      max-width: 760px;
    }

    .hero-badge {
      display: inline-block;
      background: rgba(37,99,235,0.25);
      border: 1px solid rgba(37,99,235,0.5);
      color: #93bbff;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 100px;
      margin-bottom: 22px;
    }

    .hero h1 {
      font-size: clamp(1.8rem, 4.5vw, 3rem);
      font-weight: 700;
      line-height: 1.18;
      margin-bottom: 22px;
      color: var(--white);
    }

    .hero-sub {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.78);
      margin-bottom: 36px;
      max-width: 580px;
      font-weight: 300;
    }

    .hero-buttons {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 40px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 12px 28px;
      border-radius: var(--radius);
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Source Sans 3', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
      text-decoration: none;
    }

    .btn-primary {
      background: var(--accent);
      color: var(--white);
      border-color: var(--accent);
    }

    .btn-primary:hover {
      background: var(--accent-dark);
      border-color: var(--accent-dark);
      text-decoration: none;
      color: var(--white);
    }

    .btn-outline {
      background: transparent;
      color: var(--white);
      border-color: rgba(255,255,255,0.5);
    }

    .btn-outline:hover {
      background: rgba(255,255,255,0.1);
      border-color: var(--white);
      text-decoration: none;
      color: var(--white);
    }

    .btn-dark {
      background: var(--primary);
      color: var(--white);
      border-color: var(--primary);
    }

    .btn-dark:hover {
      background: #333;
      text-decoration: none;
      color: var(--white);
    }

    .trust-pills {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .trust-pill {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.9);
      font-size: 0.82rem;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 100px;
      letter-spacing: 0.04em;
    }

    /* ===================== SECTIONS ===================== */
    section {
      padding: 80px 0;
    }

    section:nth-child(even) {
      background: var(--light);
    }

    .section-label {
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }

    .section-title {
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 18px;
    }

    .section-intro {
      font-size: 1.05rem;
      color: var(--text-light);
      max-width: 620px;
      margin-bottom: 48px;
      line-height: 1.7;
    }

    /* ===================== ABOUT ===================== */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 48px;
      align-items: center;
    }

    .about-image-wrap {
      position: relative;
    }

    .about-image-wrap img {
      width: 100%;
      border-radius: 8px;
      display: block;
      box-shadow: var(--shadow-lg);
    }

    .about-year-badge {
      position: absolute;
      bottom: -20px;
      right: -10px;
      background: var(--accent);
      color: var(--white);
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      padding: 18px 22px;
      border-radius: var(--radius);
      text-align: center;
      box-shadow: var(--shadow);
      line-height: 1.2;
    }

    .about-year-badge span {
      display: block;
      font-size: 1.8rem;
      font-weight: 700;
    }

    .about-text blockquote {
      border-left: 4px solid var(--accent);
      padding-left: 20px;
      margin: 28px 0;
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      color: var(--primary);
      font-style: italic;
      line-height: 1.5;
    }

    .about-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 32px;
    }

    .stat-item {
      text-align: center;
      background: var(--white);
      padding: 20px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--mid);
    }

    .stat-number {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent);
      display: block;
    }

    .stat-label {
      font-size: 0.8rem;
      color: var(--text-light);
      font-weight: 600;
      margin-top: 4px;
    }

    /* ===================== SERVICES ===================== */
    .services-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .service-card {
      background: var(--white);
      border: 1px solid var(--mid);
      border-radius: 8px;
      padding: 32px 28px;
      transition: box-shadow 0.25s, transform 0.25s;
    }

    .service-card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-3px);
    }

    .service-icon {
      font-size: 2.2rem;
      margin-bottom: 16px;
      display: block;
    }

    .service-card h3 {
      font-size: 1.2rem;
      color: var(--primary);
      margin-bottom: 10px;
    }

    .service-card p {
      color: var(--text-light);
      font-size: 0.95rem;
      line-height: 1.65;
    }

    .service-card.featured {
      border-color: var(--accent);
      border-width: 2px;
    }

    .service-card.featured .service-icon {
      color: var(--accent);
    }

    /* ===================== PORTFOLIO ===================== */
    .portfolio-grid {
      column-count: 1;
      column-gap: 12px;
    }

    .portfolio-item {
      break-inside: avoid;
      margin-bottom: 12px;
      position: relative;
      border-radius: 4px;
      overflow: hidden;
    }

    .portfolio-item img {
      width: 100%;
      display: block;
      border-radius: 4px;
      transition: transform 0.35s ease;
    }

    .portfolio-item:hover img {
      transform: scale(1.03);
    }

    .portfolio-caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(transparent, rgba(26,26,26,0.82));
      color: var(--white);
      font-size: 0.82rem;
      font-weight: 600;
      padding: 28px 14px 12px;
      border-radius: 0 0 4px 4px;
    }

    .portfolio-cta-wrap {
      text-align: center;
      margin-top: 40px;
    }

    /* ===================== TRUST ===================== */
    .trust-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .trust-item {
      display: flex;
      gap: 18px;
      align-items: flex-start;
      background: var(--white);
      padding: 24px 22px;
      border-radius: 8px;
      border: 1px solid var(--mid);
      box-shadow: 0 2px 10px rgba(26,26,26,0.05);
    }

    .trust-check {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      background: #e8f0fe;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: var(--accent);
    }

    .trust-item h3 {
      font-size: 1rem;
      color: var(--primary);
      margin-bottom: 5px;
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 700;
    }

    .trust-item p {
      font-size: 0.9rem;
      color: var(--text-light);
    }

    /* ===================== FAQ ===================== */
    .faq-list {
      max-width: 780px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .faq-item {
      background: var(--white);
      border: 1px solid var(--mid);
      border-radius: 8px;
      overflow: hidden;
    }

    .faq-question {
      width: 100%;
      background: none;
      border: none;
      text-align: left;
      padding: 20px 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      color: var(--primary);
      font-weight: 700;
      transition: background 0.2s;
    }

    .faq-question:hover {
      background: #f4f2ee;
    }

    .faq-icon {
      flex-shrink: 0;
      font-size: 1.3rem;
      color: var(--accent);
      transition: transform 0.3s;
      font-style: normal;
    }

    .faq-item.open .faq-icon {
      transform: rotate(45deg);
    }

    .faq-answer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease, padding 0.3s;
    }

    .faq-item.open .faq-answer {
      max-height: 400px;
    }

    .faq-answer-inner {
      padding: 0 24px 22px;
      font-size: 0.97rem;
      color: var(--text-light);
      line-height: 1.7;
    }

    /* ===================== OBJECTIONS ===================== */
    .objections-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .objection-card {
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .objection-fear {
      background: #fff3f3;
      border: 1px solid #ffd5d5;
      padding: 20px 24px;
    }

    .objection-fear h3 {
      font-size: 1rem;
      color: #c0392b;
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .objection-fear p {
      font-size: 0.9rem;
      color: #7a3232;
      margin-top: 8px;
    }

    .objection-response {
      background: #f0f7ff;
      border: 1px solid #c3dafe;
      border-top: none;
      padding: 20px 24px;
    }

    .objection-response h3 {
      font-size: 1rem;
      color: var(--accent-dark);
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .objection-response p {
      font-size: 0.9rem;
      color: #2c4a7c;
      margin-top: 8px;
    }

    /* ===================== TESTIMONIALS ===================== */
    .testimonials-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    .testimonial-card {
      background: var(--white);
      border: 1px solid var(--mid);
      border-radius: 8px;
      padding: 30px 28px;
      box-shadow: var(--shadow);
      position: relative;
    }

    .testimonial-card::before {
      content: '"';
      font-family: 'Playfair Display', serif;
      font-size: 5rem;
      color: #e8e4dd;
      position: absolute;
      top: 10px;
      left: 20px;
      line-height: 1;
    }

    .stars {
      color: #f59e0b;
      font-size: 1.1rem;
      margin-bottom: 14px;
    }

    .testimonial-text {
      font-size: 1rem;
      color: var(--text);
      line-height: 1.7;
      font-style: italic;
      margin-bottom: 20px;
      position: relative;
      z-index: 1;
    }

    .testimonial-author {
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--primary);
    }

    .testimonial-location {
      font-size: 0.82rem;
      color: var(--text-light);
    }

    /* ===================== CONTACT ===================== */
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 48px;
    }

    .contact-flow {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .flow-step {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      position: relative;
      padding-bottom: 28px;
    }

    .flow-step:last-child {
      padding-bottom: 0;
    }

    .flow-step::after {
      content: '';
      position: absolute;
      left: 20px;
      top: 44px;
      bottom: 0;
      width: 2px;
      background: var(--mid);
    }

    .flow-step:last-child::after {
      display: none;
    }

    .flow-num {
      flex-shrink: 0;
      width: 42px;
      height: 42px;
      background: var(--accent);
      color: var(--white);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.9rem;
      z-index: 1;
    }

    .flow-content h3 {
      font-size: 1rem;
      font-family: 'Source Sans 3', sans-serif;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 4px;
    }

    .flow-content p {
      font-size: 0.88rem;
      color: var(--text-light);
    }

    .contact-details {
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .contact-detail-item {
      display: flex;
      gap: 14px;
      align-items: flex-start;
      font-size: 0.95rem;
    }

    .contact-detail-icon {
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .contact-detail-item strong {
      display: block;
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 2px;
    }
