<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>dolomit Widget</title>
<link href="https://fonts.googleapis.com/css2?family=Alegreya+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* ── RESET ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── PALETTE ── */
  :root {
    --p50:  #F8EDEC;
    --p100: #F1DADA;
    --p200: #E3B5B5;
    --p300: #D6908F;
    --p400: #C86C6A;
    --p500: #BA4745;
    --p600: #953937;
    --p700: #702A29;
    --p800: #4A1C1C;
    --p900: #250E0E;
    --primary: #ae4341;
    --font: 'Alegreya Sans', sans-serif;
  }

  body {
    font-family: var(--font);
    background: #f0ece6;
    min-height: 100vh;
  }

  /* ── WIDGET ROOT ── */
  .vg-widget {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 0;
  }

  /* ── CHAT WINDOW ── */
  .vg-chat {
    width: 370px;
    height: 580px;
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    display: flex;
    flex-direction: column;
    transform-origin: bottom right;
    transform: scale(0.9) translateY(10px);
    opacity: 0;
    pointer-events: none;
    transition: transform 0.22s cubic-bezier(.34,1.3,.64,1), opacity 0.18s ease;
    margin-bottom: 12px;
  }
  .vg-chat.open {
    transform: scale(1) translateY(0);
    opacity: 1;
    pointer-events: all;
  }

  /* ── HEADER ── */
  .vg-header {
    background: var(--p600);
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .vg-header-avatar {
    width: 36px; height: 36px;
    flex-shrink: 0;
  }
  .vg-header-text { flex: 1; min-width: 0; }
  .vg-header-title {
    color: white;
    font-size: 15px;
    font-weight: 700;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .vg-header-sub {
    color: rgba(255,255,255,0.65);
    font-size: 12px;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 1px;
  }
  .vg-header-close {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: rgba(255,255,255,0.18);
    border: none; cursor: pointer;
    color: white; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
    line-height: 1;
  }
  .vg-header-close:hover { background: rgba(255,255,255,0.3); }

  /* ── MESSAGES ── */
  .vg-messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px 12px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: white;
    scroll-behavior: smooth;
  }
  .vg-messages::-webkit-scrollbar { width: 3px; }
  .vg-messages::-webkit-scrollbar-thumb { background: var(--p200); border-radius: 2px; }

  /* Bot row */
  .vg-row-bot {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    align-self: flex-start;
    max-width: 86%;
  }
  .vg-msg-avatar {
    width: 28px; height: 28px;
    flex-shrink: 0;
    margin-bottom: 2px;
  }
  .vg-bubble-bot {
    background: white;
    color: #1a1a1a;
    border: 1px solid var(--p100);
    border-radius: 14px 14px 14px 3px;
    padding: 10px 13px;
    font-size: 14px;
    font-family: var(--font);
    line-height: 1.55;
    word-break: break-word;
  }
  .vg-bubble-bot a {
    color: var(--primary);
    text-decoration: underline;
    word-break: break-all;
  }

  /* User row */
  .vg-row-user {
    align-self: flex-end;
    max-width: 80%;
  }
  .vg-bubble-user {
    background: var(--primary);
    color: white;
    border-radius: 14px 14px 3px 14px;
    padding: 10px 13px;
    font-size: 14px;
    font-family: var(--font);
    line-height: 1.55;
    word-break: break-word;
  }

  /* System */
  .vg-system {
    align-self: center;
    background: var(--p50);
    color: var(--p400);
    font-size: 11px;
    font-family: var(--font);
    padding: 4px 12px;
    border-radius: 20px;
  }

  /* CTA */
  .vg-cta {
    display: inline-block;
    margin-top: 8px;
    background: var(--primary);
    color: white;
    text-decoration: none;
    padding: 7px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-family: var(--font);
    font-weight: 500;
    transition: background 0.15s;
  }
  .vg-cta:hover { background: var(--p600); }

  /* Typing */
  .vg-dots { display: flex; gap: 4px; padding: 2px 0; }
  .vg-dots span {
    width: 7px; height: 7px;
    background: var(--p300);
    border-radius: 50%;
    animation: vgBounce 1.2s infinite;
  }
  .vg-dots span:nth-child(2) { animation-delay: 0.2s; }
  .vg-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes vgBounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-5px); }
  }

  /* ── INPUT AREA ── */
  .vg-input-area {
    background: var(--p50);
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    border-top: 1px solid var(--p100);
  }
  .vg-input-icon {
    color: var(--p400);
    flex-shrink: 0;
    display: flex; align-items: center;
  }
  .vg-input-icon svg { width: 16px; height: 16px; }
  .vg-input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-size: 14px;
    font-family: var(--font);
    color: #1a1a1a;
    min-width: 0;
  }
  .vg-input::placeholder { color: var(--p300); }
  .vg-btn-reset {
    width: 28px; height: 28px;
    border: none; background: none;
    cursor: pointer;
    color: var(--p300);
    display: flex; align-items: center; justify-content: center;
    transition: color 0.15s;
    flex-shrink: 0;
  }
  .vg-btn-reset:hover { color: var(--primary); }
  .vg-btn-reset svg { width: 16px; height: 16px; }
  .vg-btn-send {
    width: 32px; height: 32px;
    background: var(--primary);
    border: none; border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .vg-btn-send:hover { background: var(--p600); }
  .vg-btn-send:disabled { background: var(--p200); cursor: not-allowed; }
  .vg-btn-send svg { width: 13px; height: 13px; }

  /* ── FOOTER ── */
  .vg-footer {
    background: white;
    padding: 6px 14px 8px;
    text-align: center;
    font-size: 11px;
    font-family: var(--font);
    color: var(--p300);
    border-top: 1px solid var(--p50);
    flex-shrink: 0;
  }
  .vg-footer a { color: var(--primary); text-decoration: underline; }

  /* ── TRIGGER AREA ── */
  .vg-trigger-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }

  /* Close X button (top right, separate) */
  .vg-trigger-close {
    width: 24px; height: 24px;
    background: white;
    border: none;
    border-radius: 50%;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    cursor: pointer;
    font-size: 13px;
    color: #666;
    display: none;
    align-items: center;
    justify-content: center;
    align-self: flex-end;
    margin-right: 4px;
    transition: background 0.15s;
    line-height: 1;
  }
  .vg-trigger-close.visible { display: flex; }
  .vg-trigger-close:hover { background: #f0f0f0; }

  /* Pill + avatar row */
  .vg-trigger-row {
    display: flex;
    align-items: flex-end;
    gap: 0;
  }

  /* Pill */
  .vg-pill {
    background: var(--primary);
    color: white;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 500;
    padding: 11px 20px;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(174,67,65,0.4);
    white-space: nowrap;
    transition: transform 0.15s, box-shadow 0.15s;
    user-select: none;
    display: flex;
    align-items: center;
  }
  .vg-pill:hover {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(174,67,65,0.45);
  }

  /* d. avatar badge (overlaps pill bottom-right) */
  .vg-trigger-avatar {
    width: 46px; height: 46px;
    flex-shrink: 0;
    margin-left: -8px;
    margin-bottom: -2px;
    cursor: pointer;
    transition: transform 0.15s;
    position: relative;
  }
  .vg-trigger-avatar:hover { transform: scale(1.05); }

  /* ── LOGO: precise path-based, no font ── */

  /* ── CONFIG BAR (test only) ── */
  .vg-config {
    position: fixed;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    border: 0.5px solid #ddd;
    border-radius: 8px;
    padding: 7px 12px;
    display: flex;
    gap: 8px;
    align-items: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    z-index: 9998;
  }
  .vg-config label { font-size: 11px; color: #888; white-space: nowrap; font-family: sans-serif; }
  .vg-config input {
    border: 0.5px solid #ccc;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 11px;
    font-family: monospace;
    outline: none;
    width: 340px;
  }
  .vg-config-btn {
    border: 0.5px solid #ccc;
    background: #f5f5f5;
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 11px;
    cursor: pointer;
    font-family: sans-serif;
    white-space: nowrap;
  }

  /* ── DEBUG ── */
  .vg-debug {
    position: fixed;
    bottom: 20px;
    left: 20px;
    width: 300px;
    background: #1a1814;
    border-radius: 8px;
    overflow: hidden;
    display: none;
    font-family: monospace;
  }
  .vg-debug.on { display: block; }
  .vg-debug-head {
    padding: 6px 10px;
    background: #2a2420;
    font-size: 10px;
    color: #888;
    display: flex;
    justify-content: space-between;
  }
  .vg-debug-head span { cursor: pointer; }
  .vg-debug-body {
    padding: 8px 10px;
    font-size: 10px;
    color: #a0d8a0;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 160px;
    overflow-y: auto;
    line-height: 1.5;
  }

  /* ── MOBILE ── */
  @media (max-width: 480px) {
    .vg-chat {
      width: 100vw;
      height: 100dvh;
      border-radius: 0;
      position: fixed;
      top: 0; left: 0;
      margin-bottom: 0;
    }
    .vg-widget {
      bottom: 16px;
      right: 16px;
    }
    .vg-pill { font-size: 13px; padding: 9px 16px; }
    .vg-config { display: none; }
  }
</style>
</head>
<body>

<!-- Config Bar -->
<div class="vg-config">
  <label>Webhook</label>
  <input type="text" id="webhookUrl" value="https://steewee.app.n8n.cloud/webhook-test/leanAgent" />
  <button class="vg-config-btn" onclick="toggleDebug()">debug</button>
</div>

<!-- Widget -->
<div class="vg-widget" id="vgWidget">

  <!-- Chat Window -->
  <div class="vg-chat" id="vgChat">

    <!-- Header -->
    <div class="vg-header">
      <div class="vg-header-avatar">
        <svg width="36" height="36" viewBox="0 0 100 100">
          <defs><clipPath id="hc"><circle cx="50" cy="50" r="50"/></clipPath></defs>
          <g clip-path="url(#hc)">
            <rect width="100" height="100" fill="#ae4341"/>
            <path d="M46,19 L59,19 L59,73 L23,73 A26,26 0 0 1 23,37 L46,37 Z" fill="white"/>
            <rect x="29" y="48" width="17" height="14" fill="#ae4341"/>
            <rect x="71" y="59" width="12" height="13" fill="white"/>
            <rect x="15" y="81" width="68" height="3" fill="white" rx="1"/>
          </g>
        </svg>
      </div>
      <div class="vg-header-text">
        <div class="vg-header-title">Dolomit Assistent</div>
        <div class="vg-header-sub">Speicheröfen aus Tirol · Steinringer Ofenbau</div>
      </div>
      <button class="vg-header-close" onclick="toggleChat()">×</button>
    </div>

    <!-- Messages -->
    <div class="vg-messages" id="vgMessages">
      <div class="vg-row-bot">
        <div class="vg-msg-avatar"><svg width="28" height="28" viewBox="0 0 100 100">
          <defs><clipPath id="ic"><circle cx="50" cy="50" r="50"/></clipPath></defs>
          <g clip-path="url(#ic)">
            <rect width="100" height="100" fill="#ae4341"/>
            <path d="M46,19 L59,19 L59,73 L23,73 A26,26 0 0 1 23,37 L46,37 Z" fill="white"/>
            <rect x="29" y="48" width="17" height="14" fill="#ae4341"/>
            <rect x="71" y="59" width="12" height="13" fill="white"/>
            <rect x="15" y="81" width="68" height="3" fill="white" rx="1"/>
          </g>
        </svg></div>
        <div class="vg-bubble-bot">Servus! Wie kann ich dir helfen?</div>
      </div>
    </div>

    <!-- Input -->
    <div class="vg-input-area">
      <div class="vg-input-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <input
        type="text"
        class="vg-input"
        id="vgInput"
        placeholder="Nachricht"
        onkeydown="handleKey(event)"
        autocomplete="off"
      />
      <button class="vg-btn-reset" onclick="resetSession()" title="Neue Unterhaltung">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15a9 9 0 1 0 .49-3.91"/>
        </svg>
      </button>
      <button class="vg-btn-send" id="vgSend" onclick="sendMessage()">
        <svg viewBox="0 0 24 24" fill="white">
          <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/>
        </svg>
      </button>
    </div>

    <!-- Footer -->
    <div class="vg-footer">
      Ein Service der <a href="https://www.kleinkachelofen.net" target="_blank" rel="noopener">Steinringer-Ofenbau-GmbH</a>
    </div>

  </div>

  <!-- Trigger -->
  <div class="vg-trigger-wrap">
    <!-- X close button (visible when chat open) -->
    <button class="vg-trigger-close" id="vgTriggerClose" onclick="toggleChat()">×</button>

    <!-- Pill + Avatar -->
    <div class="vg-trigger-row" id="vgTriggerRow">
      <div class="vg-pill" onclick="toggleChat()">Servus, wie kann ich dir helfen?</div>
      <div class="vg-trigger-avatar" onclick="toggleChat()">
        <!-- viewBox enlarged to fit badge -->
        <svg width="46" height="46" viewBox="-8 -8 116 116" style="overflow:visible">
          <defs><clipPath id="tc"><circle cx="50" cy="50" r="50"/></clipPath></defs>
          <g clip-path="url(#tc)">
            <rect x="-8" y="-8" width="116" height="116" fill="#ae4341"/>
            <path d="M46,19 L59,19 L59,73 L23,73 A26,26 0 0 1 23,37 L46,37 Z" fill="white"/>
            <rect x="29" y="48" width="17" height="14" fill="#ae4341"/>
            <rect x="71" y="59" width="12" height="13" fill="white"/>
            <rect x="15" y="81" width="68" height="3" fill="white" rx="1"/>
          </g>
          <!-- Badge "2" -->
          <circle cx="84" cy="14" r="13" fill="#702A29"/>
          <text x="84" y="19" text-anchor="middle" dominant-baseline="central" fill="white" font-size="13" font-weight="700" font-family="Alegreya Sans, sans-serif">2</text>
        </svg>
      </div>
    </div>
  </div>

</div>

<!-- Debug -->
<div class="vg-debug" id="vgDebug">
  <div class="vg-debug-head">
    <span>debug</span>
    <span onclick="clearLog()">✕</span>
  </div>
  <div class="vg-debug-body" id="vgLog"></div>
</div>

<script>
  let sessionId = uid();
  let loading   = false;
  let chatOpen  = false;

  function uid() {
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
      const r = Math.random() * 16 | 0;
      return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
    });
  }

  // ── TOGGLE ──
  function toggleChat() {
    chatOpen = !chatOpen;
    document.getElementById('vgChat').classList.toggle('open', chatOpen);
    document.getElementById('vgTriggerClose').classList.toggle('visible', chatOpen);
    document.getElementById('vgTriggerRow').style.opacity = chatOpen ? '0.5' : '1';
    document.getElementById('vgTriggerRow').style.pointerEvents = chatOpen ? 'none' : 'all';
    if (chatOpen) setTimeout(() => document.getElementById('vgInput').focus(), 260);
  }

  // ── RESET ──
  function resetSession() {
    sessionId = uid();
    const msgs = document.getElementById('vgMessages');
    msgs.innerHTML = `
      <div class="vg-system">Neue Unterhaltung</div>
      <div class="vg-row-bot">
        ${avatarSvg()}
        <div class="vg-bubble-bot">Servus! Wie kann ich dir helfen?</div>
      </div>`;
    log('reset → ' + sessionId);
  }

  // ── SEND ──
  async function sendMessage() {
    const inp = document.getElementById('vgInput');
    const msg = inp.value.trim();
    if (!msg || loading) return;

    const url = document.getElementById('webhookUrl').value.trim();
    inp.value = '';
    loading   = true;
    document.getElementById('vgSend').disabled = true;

    addUser(msg);
    const tid = addTyping();

    const payload = { session_id: sessionId, tenant_id: 'dolomit-tirol', message: msg };
    log('→ ' + JSON.stringify(payload));

    try {
      const res  = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      removeTyping(tid);

      if (!res.ok) {
        const err = await res.text();
        log('✕ ' + res.status + ' ' + err);
        addSystem('Fehler ' + res.status);
      } else {
        const data = await res.json();
        log('← ' + JSON.stringify(data, null, 2));
        const text = data.message ?? data[0]?.message ?? '';
        const cta  = data.cta    ?? data[0]?.cta    ?? null;
        addBot(text, cta);
      }
    } catch (e) {
      removeTyping(tid);
      log('✕ ' + e.message);
      addSystem('Verbindungsfehler');
    }

    loading = false;
    document.getElementById('vgSend').disabled = false;
    document.getElementById('vgInput').focus();
  }

  // ── DOM ──
  function avatarSvg(size = 28) {
    return `<div class="vg-msg-avatar"><svg width="${size}" height="${size}" viewBox="0 0 100 100">
      <defs><clipPath id="ac${size}"><circle cx="50" cy="50" r="50"/></clipPath></defs>
      <g clip-path="url(#ac${size})">
        <rect width="100" height="100" fill="#ae4341"/>
        <path d="M46,19 L59,19 L59,73 L23,73 A26,26 0 0 1 23,37 L46,37 Z" fill="white"/>
        <rect x="29" y="48" width="17" height="14" fill="#ae4341"/>
        <rect x="71" y="59" width="12" height="13" fill="white"/>
        <rect x="15" y="81" width="68" height="3" fill="white" rx="1"/>
      </g>
    </svg></div>`;
  }

  function addUser(text) {
    const m = document.getElementById('vgMessages');
    const d = document.createElement('div');
    d.className = 'vg-row-user';
    d.innerHTML = `<div class="vg-bubble-user">${esc(text)}</div>`;
    m.appendChild(d); scrollBottom();
  }

  function addBot(text, cta) {
    const m = document.getElementById('vgMessages');
    const d = document.createElement('div');
    d.className = 'vg-row-bot';
    const ctaHtml = cta ? `<a class="vg-cta" href="${cta.url}" target="_blank" rel="noopener">${esc(cta.label)}</a>` : '';
    d.innerHTML = `${avatarSvg()}<div><div class="vg-bubble-bot">${linkify(esc(text))}</div>${ctaHtml}</div>`;
    m.appendChild(d); scrollBottom();
  }

  function addSystem(text) {
    const m = document.getElementById('vgMessages');
    const d = document.createElement('div');
    d.className = 'vg-system';
    d.textContent = text;
    m.appendChild(d); scrollBottom();
  }

  function addTyping() {
    const m  = document.getElementById('vgMessages');
    const id = 'vgt-' + Date.now();
    const d  = document.createElement('div');
    d.className = 'vg-row-bot'; d.id = id;
    d.innerHTML = `${avatarSvg()}<div class="vg-bubble-bot"><div class="vg-dots"><span></span><span></span><span></span></div></div>`;
    m.appendChild(d); scrollBottom(); return id;
  }

  function removeTyping(id) { const e = document.getElementById(id); if (e) e.remove(); }
  function scrollBottom() { const m = document.getElementById('vgMessages'); m.scrollTop = m.scrollHeight; }

  function esc(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\n/g,'<br>');
  }
  function linkify(s) {
    return s.replace(/(https?:\/\/[^\s&<]+)/g,
      '<a href="$1" target="_blank" rel="noopener">$1</a>');
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function toggleDebug() { document.getElementById('vgDebug').classList.toggle('on'); }
  function log(m) {
    const b = document.getElementById('vgLog');
    b.textContent += '[' + new Date().toLocaleTimeString('de-AT') + '] ' + m + '\n\n';
    b.scrollTop = b.scrollHeight;
  }
  function clearLog() { document.getElementById('vgLog').textContent = ''; }
</script>
</body>
</html>
