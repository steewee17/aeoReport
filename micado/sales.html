  <title>Sales OS · MICADO Smart Engineering</title>

    :root{
      --bg:#f4f7fa;--bg2:#ffffff;--bg3:#eef2f7;--bg4:#e2e8f0;
      --bdr:rgba(0,0,0,0.08);--bdr2:rgba(0,0,0,0.14);
      --tx:#0f172a;--tx2:#475569;--tx3:#94a3b8;
      --blue:#0081C2;--blue-dk:#006ba3;--blue-lt:#0369a1;
      --glow:rgba(0,129,194,0.10);--glow2:rgba(0,129,194,0.06);
      --green:#10b981;--green-bg:rgba(16,185,129,0.10);
      --amber:#f59e0b;--amber-bg:rgba(245,158,11,0.10);
      --red:#ef4444;--red-bg:rgba(239,68,68,0.08);
      --head:'Barlow Condensed',sans-serif;
      --body:'Barlow',sans-serif;
      --ease:cubic-bezier(.4,0,.2,1);

    html,body,#root{height:100%;overflow:hidden}
    body{font-family:var(--body);background:var(--bg);color:var(--tx);line-height:1.5;font-size:15px}
    .app{display:flex;flex-direction:column;height:100vh}
    .hdr{background:#fff;border-bottom:3px solid var(--blue);height:60px;display:flex;align-items:center;padding:0 24px;gap:14px;flex-shrink:0;position:relative;z-index:50}
    .hdr-mark{width:30px;height:30px;background:var(--blue);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--head);font-weight:800;font-size:.82rem;letter-spacing:.04em;color:#fff}
    .hdr-brand{font-family:var(--head);font-weight:800;font-size:1.05rem;letter-spacing:.04em;color:var(--tx)}
    .hdr-brand span{color:var(--blue)}
    .hdr-div{width:1px;height:26px;background:var(--bdr2)}
    .hdr-client{font-family:var(--head);font-weight:700;font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--tx3)}
    .hdr-sp{flex:1}
    .hdr-date{font-size:.8rem;color:var(--tx3)}
    .hdr-dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
    .hdr-av{width:34px;height:34px;border-radius:50%;background:var(--glow);border:2px solid var(--blue);display:flex;align-items:center;justify-content:center;font-family:var(--head);font-weight:700;font-size:.8rem;color:var(--blue);cursor:pointer;transition:.15s var(--ease)}
    .hdr-av:hover{background:var(--blue);color:#fff}
    .layout{display:flex;flex:1;overflow:hidden}
    .sidebar{width:210px;background:#fff;border-right:1px solid var(--bdr);padding:16px 10px;display:flex;flex-direction:column;flex-shrink:0}
    .nav-lbl{font-family:var(--head);font-size:.62rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--tx3);padding:0 8px 8px}
    .nav-btn{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;cursor:pointer;font-size:.875rem;font-weight:500;color:var(--tx2);background:none;border:none;width:100%;text-align:left;transition:.15s var(--ease)}
    .nav-btn:hover{background:var(--bg3);color:var(--tx)}
    .nav-btn.active{background:var(--glow);color:var(--blue);font-weight:600}
    .nav-bdg{margin-left:auto;background:var(--blue);color:#fff;font-family:var(--head);font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:999px}
    .nav-bdg.red{background:var(--red)}
    .main{flex:1;overflow-y:auto;padding:24px 28px;background:var(--bg)}
    .pg-title{font-family:var(--head);font-weight:800;font-size:1.9rem;letter-spacing:-.01em;color:var(--tx)}
    .pg-sub{font-size:.84rem;color:var(--tx3);margin-top:3px}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:18px 0 24px}
    .stat{background:#fff;border:1px solid var(--bdr);border-radius:12px;padding:14px 18px}
    .stat-n{font-family:var(--head);font-weight:800;font-size:1.9rem;line-height:1;color:var(--tx)}
    .stat-n.blue{color:var(--blue)}.stat-n.green{color:var(--green)}.stat-n.amber{color:var(--amber)}
    .stat-lbl{font-family:var(--head);font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--tx3);margin-top:4px}
    .sec{margin-bottom:24px}

    .lead-card{background:#fff;border:1px solid rgba(0,129,194,.22);border-left:4px solid var(--blue);border-radius:13px;padding:18px 22px;margin-bottom:10px;position:relative;overflow:hidden;transition:.18s var(--ease)}

    .lc-co{font-size:.82rem;color:var(--tx3);margin-top:2px}
    .lc-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
    .lc-time{font-size:.76rem;color:var(--tx3);white-space:nowrap;margin-left:auto}

    .roi-lbl{font-family:var(--head);font-size:.62rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--tx3);margin-bottom:3px}

    .btn-full{width:100%;justify-content:center}

    .deal-note{font-size:.74rem;color:var(--tx3);border-top:1px solid var(--bdr);padding-top:7px;margin-top:8px}
    .copilot-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
    .panel{background:#fff;border:1px solid var(--bdr);border-radius:16px;padding:20px 22px}
    .panel-title{font-family:var(--head);font-size:.68rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--tx3);margin-bottom:16px;display:flex;align-items:center;gap:7px}
    .ctx-card{background:var(--glow);border:1px solid rgba(0,129,194,.2);border-radius:8px;padding:12px 14px;margin-bottom:14px}
    .ctx-lbl{font-family:var(--head);font-size:.62rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--blue-lt);margin-bottom:4px}
    .ctx-val{font-size:.875rem;font-weight:600;color:var(--tx)}
    .ctx-sub{font-size:.78rem;color:var(--tx2);margin-top:2px}
    .f-grp{margin-bottom:14px}
    .f-lbl{display:block;font-family:var(--head);font-size:.68rem;font-weight:700;letter-spacing:.10em;text-transform:uppercase;color:var(--tx3);margin-bottom:5px}
    .f-input,.f-ta,.f-sel{width:100%;background:var(--bg3);border:1.5px solid var(--bdr2);border-radius:7px;padding:9px 12px;color:var(--tx);font-family:var(--body);font-size:.875rem;outline:none;transition:.15s var(--ease)}

    .f-ta{resize:vertical;min-height:80px}
    .toggle-grp{display:flex;border:1.5px solid var(--bdr2);border-radius:7px;overflow:hidden}
    .tog-btn{flex:1;padding:7px 10px;font-family:var(--head);font-size:.72rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;border:none;cursor:pointer;transition:.13s var(--ease);background:transparent;color:var(--tx3)}
    .tog-btn.on{background:var(--blue);color:#fff}
    .tog-btn:not(.on):hover{background:var(--bg3);color:var(--tx2)}
    .draft-box{background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:14px;font-size:.86rem;line-height:1.75;color:var(--tx);min-height:220px;white-space:pre-wrap}
    .draft-empty{color:var(--tx3);font-style:italic}
    .draft-actions{display:flex;gap:8px;margin-top:10px}
    .log-result-item{display:flex;gap:7px;align-items:flex-start;margin-bottom:5px;font-size:.86rem;color:var(--tx2);line-height:1.5}
    .spin{width:15px;height:15px;border:1.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
    .spin.dark{border:1.5px solid var(--bdr2);border-top-color:var(--blue)}
    @keyframes spin{to{transform:rotate(360deg)}}
    .deal-won{margin-top:10px;font-family:var(--head);font-size:.68rem;font-weight:700;letter-spacing:.10em;text-transform:uppercase;color:#047857;background:var(--green-bg);border:1px solid rgba(16,185,129,.2);border-radius:6px;padding:5px 10px;display:inline-block}
    .btn-advance{margin-top:10px;width:100%;padding:7px 10px;font-family:var(--head);font-size:.72rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;border:1.5px solid var(--bdr2);border-radius:6px;background:transparent;color:var(--tx3);cursor:pointer;transition:.15s var(--ease);display:flex;align-items:center;justify-content:center;gap:6px}
    .btn-advance:hover:not(:disabled){border-color:var(--blue);color:var(--blue);background:var(--glow)}
    .btn-advance:disabled{opacity:.5;cursor:not-allowed}
    .pl-empty{font-size:.8rem;color:var(--tx3);font-style:italic;padding:12px 0;text-align:center}
    .loading{display:flex;align-items:center;gap:12px;color:var(--tx3);padding:48px 0;font-size:.9rem}
  </style>
</head>

      clock:   <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={S.w} strokeLinecap={S.lc} strokeLinejoin={S.lj}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
      mailseq: <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={S.w} strokeLinecap={S.lc} strokeLinejoin={S.lj}><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>,
      alert:   <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={S.w} strokeLinecap={S.lc} strokeLinejoin={S.lj}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,
      inbox:   <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={S.w} strokeLinecap={S.lc} strokeLinejoin={S.lj}><polyline points="22 12 16 12 14 15 10 15 8 12 2 12"/><path d="M5.45 5.11L2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"/></svg>,
      list:    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={S.w} strokeLinecap={S.lc} strokeLinejoin={S.lj}><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>,
    };

    // ─── App ───────────────────────────────────────────────────────────────────
    function SalesOS() {
      const [tab,       setTab]       = useState("today");
      const N8N_PROXY = "https://steewee.app.n8n.cloud/webhook/claude-proxy";
      const [leads,     setLeads]     = useState([]);
      const [allSubs,   setAllSubs]   = useState([]);
      const [pipeLeads, setPipeLeads] = useState([]);
      const [tasks,     setTasks]     = useState([]);
      const [deals,     setDeals]     = useState([]);
      const [contacts,  setContacts]  = useState([]);
      const [loading,   setLoading]   = useState(true);
      const [advancing, setAdvancing] = useState(null);
      const [emailCtx,     setEmailCtx]     = useState(null);
      const [selectedCId,  setSelectedCId]  = useState("");
      const [eLang,     setELang]     = useState("de");
      const [eTone,     setETone]     = useState("formal");
      const [eNotes,    setENotes]    = useState("");
      const [eDraft,    setEDraft]    = useState("");
      const [eLoading,  setELoading]  = useState(false);
      const [eCopied,   setECopied]   = useState(false);
      const [logText,   setLogText]   = useState("");
      const [logCtact,  setLogCtact]  = useState("");
      const [logRes,    setLogRes]    = useState(null);
      const [logLoad,   setLogLoad]   = useState(false);

      useEffect(() => { loadData(); }, []);

      const loadData = async () => {
        setLoading(true);
        try {
          const [l,pl,t,d,c,all] = await Promise.all([
            supa(`sales_infra_wizard_submissions?select=*&client_slug=eq.${CLIENT}&order=created_at.desc&limit=10`),
            supa(`sales_infra_wizard_submissions?select=*&client_slug=eq.${CLIENT}&pipeline_stage=eq.lead&order=created_at.desc`),
            supa(`sales_infra_tasks?select=*&status=eq.open&order=due_date.asc&limit=20`),
            supa(`sales_infra_deals?select=*&order=last_activity.desc&limit=20`),
            supa(`sales_infra_contacts?client_slug=eq.${CLIENT}&order=created_at.desc`),
            supa(`sales_infra_wizard_submissions?select=*&client_slug=eq.${CLIENT}&order=created_at.desc`)
          ]);
          // Build lookup map: contact_id → contact object
          const cMap = {};
          c.forEach(contact => { cMap[contact.id] = contact; });
          // Merge contacts into each record client-side
          const merge = (items) => items.map(i => ({ ...i, contacts: cMap[i.contact_id] || {} }));
          setContacts(c);
          setAllSubs(all);
          setLeads(merge(l));
          setPipeLeads(merge(pl));
          setTasks(merge(t));
          setDeals(merge(d));
        } catch(e) { console.error("Supabase Fehler:", e); }
        setLoading(false);
      };

      // Promote wizard lead → qualifiziert (creates deal, removes from lead column)
      const promoteWizardLead = async (lead) => {
        setAdvancing(lead.id);
        try {
          await supaInsert("sales_infra_deals", {
            contact_id: lead.contact_id,
            stage: "qualifiziert",
            value_eur: lead.roi_eur_jahr ? Math.round(lead.roi_eur_jahr * 0.3) : null,
            last_activity: new Date().toISOString(),
            notes: `FlexGrid ${lead.bauteilgroesse} · ${lead.spannpunkte} SP · ROI ${eur(lead.roi_eur_jahr)}/Jahr`
          });
          await supaUpdate("sales_infra_wizard_submissions", lead.id, { pipeline_stage: "qualifiziert" });
          await loadData();
        } catch(e) { alert("Fehler: " + e.message); }
        setAdvancing(null);
      };

      // Promote deal to next stage
      const STAGES = ["lead","qualifiziert","angebot","abschluss"];
      const promoteDeal = async (deal) => {
        const next = STAGES[STAGES.indexOf(deal.stage) + 1];
        if (!next) return;
        setAdvancing(deal.id);
        try {
          await supaUpdate("sales_infra_deals", deal.id, { stage: next, last_activity: new Date().toISOString() });
          await loadData();
        } catch(e) { alert("Fehler: " + e.message); }
        setAdvancing(null);
      };

      const openEmail = (lead) => {
        setEmailCtx(lead);
        setSelectedCId(lead.contact_id || "");
        setEDraft(""); setTab("email");
      };

      const callClaude = async (system, user) => {
        const r = await fetch(N8N_PROXY, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            system,
            messages: [{ role: "user", content: user }]
          })
        });
        const d = await r.json();
        // Handle all possible n8n response shapes
        const obj = Array.isArray(d) ? d[0] : d;
        const text = obj?.text                      // Extract Text node output
          || obj?.content?.[0]?.text                // Raw Anthropic response
          || obj?.json?.content?.[0]?.text          // n8n wrapped response
          || null;
        if (!text) throw new Error("Kein Text in Antwort");
        return text;
      };

      const generateEmail = async () => {
        setELoading(true); setEDraft("");
        try {
          const c = emailCtx?.contacts || {};
          const langMap = {de:"Deutsch",en:"English",fr:"Français"};

          // Role-based focus
          const roleMap = {
            management:   "Geschäftsführer/Management. Fokus: ROI, Amortisation, Wettbewerbsvorteil, Referenzkunden als Beweis.",
            engineering:  "Ingenieur/Produktion. Fokus: technische Effizienz, Rüstzeitreduktion, kein Umbau bestehender Anlagen, Präzision.",
            procurement:  "Einkauf/Procurement. Fokus: nachweisbare Kosteneinsparung, TCO-Reduktion, messbarer ROI.",
            production:   "Produktionsleiter. Fokus: Rüstzeitreduktion, Flexibilität, weniger Stillstand, einfachere Bedienung.",
            other:        "B2B-Entscheider. Fokus: konkreter Nutzen, kurze Amortisation, Referenzkunden."
          };
          const roleCtx = roleMap[c.role] || roleMap.other;
          const hasWizard = !!emailCtx?.roi_eur_jahr;

          const system = `Du bist Email Copilot für Antoine Dubois, Head of Sales bei MICADO Smart Engineering GmbH.
Produkt: Octopus FlexGrid — patentiertes Spannsystem für Composite-Bauteile. Kernnutzen: 65% Rüstzeitreduktion.
Referenzkunden: Airbus, Boeing, Porsche, GKN, FACC, Carbo-Tech.
Absender-Signatur: Antoine Dubois · Head of Sales · MICADO Smart Engineering GmbH

EMPFÄNGER-ROLLE: ${roleCtx}

PFLICHTSTRUKTUR — exakt in dieser Reihenfolge:
1. Betreff: "Ihre Kalkulation — [ROI-Zahl] Jahreseinsparung bei [Unternehmen]"
2. Anrede: "Sehr geehrter Herr [Nachname]," oder "Sehr geehrte Frau [Nachname]," — immer diese Formel, kein Vorname
3. ${hasWizard ? 'Dankeseinstieg: "Danke, dass Sie unseren ROI-Kalkulator für Octopus FlexGrid ausprobiert haben, Herr/Frau [Nachname]." — natürlich, 1 Satz' : 'Einstieg: relevanter Aufhänger zur Rolle oder Branche — 1 Satz'}
4. Kernaussage: wichtigste Zahl für diese Rolle — ROI oder Rüstzeit. Nicht erklären, konstatieren. 1–2 Sätze.
5. Referenz: 1 konkreten Kunden nennen mit spezifischem Kontext (Produktion, Bauteil, Ergebnis) — nicht nur Name
6. CTA: Immer ein Telefonat oder Call vereinbaren — KEIN Angebot, KEINE Präsentation, KEIN Dokument. Formulierung offen und einladend, 1 Satz.
7. Signatur: NUR "Antoine Dubois · Head of Sales · MICADO Smart Engineering GmbH"

REGELN:
- Max. 80 Wörter Fließtext
- Kein Marketing-Sprech: nie "revolutioniert", "innovativ", "beeindruckend", "signifikant"
- Zahlen als Beweis einsetzen — nicht nacherzählen was der Empfänger eingegeben hat
- Keine Bullet Points, keine Superlative, keine Platzhalter
- Tonalität: ${eTone==="formal"?"professionell, respektvoll, persönlich":"direkt, knapp, peer-to-peer"}
- Sprache: ${langMap[eLang]}
- Format: Betreff Zeile 1, Leerzeile, Anrede, Text, Leerzeile, Signatur. Kein Preamble.`;

          const roiCtx = hasWizard
            ? `\nKalkulator-Daten (als Beweis verwenden, nicht nacherzählen):\n- Bauteilgröße: ${emailCtx.bauteilgroesse}, ${emailCtx.spannpunkte} Spannpunkte\n- ROI: ${eur(emailCtx.roi_eur_jahr)}/Jahr · Amortisation: ${emailCtx.amortisation_monate} Monate`
            : "";
          const notesCtx = eNotes ? `\nHinweis von Antoine: ${eNotes}` : "";
          setEDraft(await callClaude(system, `Erstmail an ${c.firstname} ${c.lastname}, ${c.company}${c.role ? ` (Rolle: ${c.role})` : ""}.${roiCtx}${notesCtx}`));
        } catch(e) { setEDraft(`Fehler: ${e.message}`); }
        setELoading(false);
      };

      const analyzeInteraction = async () => {
        if (!logText.trim()) return;
        setLogLoad(true); setLogRes(null);
        try {
          const system = `Extrahiere strukturierte Daten aus Vertriebsnotizen für MICADO Smart Engineering.
Antworte NUR mit JSON (kein Markdown, kein Preamble):
{"summary":"...","todos":["..."],"next_steps":["..."]}`;
          const raw = await callClaude(system, `Notiz:\n\n${logText}`);
          setLogRes(JSON.parse(raw.replace(/\`\`\`json|\`\`\`/g,"").trim()));
        } catch { setLogRes({summary:"Analysefehler — API Key prüfen.",todos:[],next_steps:[]}); }
        setLogLoad(false);
      };

      const copyDraft = () => {
        navigator.clipboard?.writeText(eDraft);
        setECopied(true); setTimeout(()=>setECopied(false),2000);
      };

      const overdue   = tasks.filter(t=>new Date(t.due_date)<new Date()).length;
      const pipeTotal = pipeLeads.length + deals.length;
      const pipeVal   = deals.reduce((a,d)=>a+(d.value_eur||0),0);
      const todayStr  = new Date().toLocaleDateString("de-AT",{weekday:"long",day:"2-digit",month:"long",year:"numeric"});

      return (
        <>
          <div className="app">
            {/* Header */}
            <header className="hdr">
              <div className="hdr-mark">OS</div>
              <div className="hdr-brand">Sales<span>OS</span></div>
              <div className="hdr-div"/>
              <div className="hdr-client">MICADO Smart Engineering</div>
              <div className="hdr-sp"/>
              <div className="hdr-date">{todayStr}</div>
              <div className="hdr-dot" title="Verbunden"/>
              <div className="hdr-av">AD</div>
            </header>

            <div className="layout">
              {/* Sidebar */}
              <nav className="sidebar">
                <div className="nav-lbl">Übersicht</div>
                {[
                  {id:"today",    label:"Mein Tag",          icon:Ic.today, badge:overdue||null, red:true},
                  {id:"email",    label:"Email Copilot",      icon:Ic.mail},
                  {id:"log",      label:"Interaktion loggen", icon:Ic.log},
                  {id:"pipeline", label:"Pipeline",           icon:Ic.pipe, badge:pipeTotal},
                ].map(({id,label,icon,badge,red})=>(
                  <button key={id} className={`nav-btn ${tab===id?"active":""}`} onClick={()=>setTab(id)}>
                    {icon}{label}
                    {badge!=null && <span className={`nav-bdg ${red?"red":""}`}>{badge}</span>}
                  </button>
                ))}
              </nav>

              {/* Main */}
              <main className="main">
                {loading ? (
                  <div className="loading"><div className="spin dark"/> Daten werden geladen…</div>
                ) : (<>
                    {/* MEIN TAG */}
                  {tab==="today" && <>
                    <div style={{marginBottom:20}}>
                      <div className="pg-title">Guten Morgen, Antoine</div>
                      <div className="pg-sub">{todayStr}</div>
                    </div>
                    <div className="stats">
                      <div className="stat"><div className={`stat-n ${overdue>0?"amber":"green"}`}>{overdue}</div><div className="stat-lbl">Überfällig</div></div>
                      <div className="stat"><div className="stat-n blue">{leads.length}</div><div className="stat-lbl">Neue Leads</div></div>
                      <div className="stat"><div className="stat-n">{deals.length}</div><div className="stat-lbl">Offene Deals</div></div>
                      <div className="stat"><div className="stat-n green">{eur(pipeVal)}</div><div className="stat-lbl">Pipeline-Wert</div></div>
                    </div>

                    <div className="sec">
                      <div className="sec-title">{Ic.inbox} Neue Kalkulator-Leads</div>
                      {leads.map(lead => {
                        const c = lead.contacts || {};
                        const initials = (c.firstname?.[0]||"")+(c.lastname?.[0]||"");
                        return (
                          <div key={lead.id} className="lead-card">
                            <div className="lc-top">
                              <div className="lc-av">{initials||"?"}</div>
                              <div style={{flex:1}}>
                                <div className="lc-name">
                                  {c.firstname||"–"} {c.lastname||""}
                                </div>
                                <div className="lc-co">
                                  {c.company||"Unternehmen unbekannt"}
                                  {c.email ? ` · ${c.email}` : ""}
                                </div>
                                <div className="lc-badges">
                                  <span className="badge b-blue">{Ic.calc} Kalkulator-Lead</span>
                                  {lead.lead_tier==="high"   && <span className="badge b-red">{Ic.phone} Heute anrufen</span>}
                                  {lead.lead_tier==="medium" && <span className="badge b-amber">{Ic.clock} Heute kontaktieren</span>}
                                  {lead.lead_tier==="low"    && <span className="badge b-green">{Ic.mailseq} Email-Sequenz</span>}
                                </div>
                              </div>
                              <div className="lc-time">{relTime(lead.created_at)}</div>
                            </div>
                            <div className="roi-strip">
                              {[
                                {lbl:"Bauteil",     val:lead.bauteilgroesse||"–"},
                                {lbl:"Spannpunkte", val:lead.spannpunkte||"–"},
                                {lbl:"Rüstzeit",    val:`${lead.ruestzeit_min||"–"} min`},
                                {lbl:"Stück / Jahr",val:(lead.stueckzahl_jahr||0).toLocaleString("de-AT")},
                                {lbl:"ROI / Jahr",  val:eur(lead.roi_eur_jahr), hl:true},
                                {lbl:"Amortisation",val:`${lead.amortisation_monate} Mo.`},
                              ].map((item,i)=>(
                                <div key={i}><div className="roi-lbl">{item.lbl}</div><div className={`roi-val ${item.hl?"hl":""}`}>{item.val}</div></div>
                              ))}
                            </div>
                            <div style={{display:"flex",gap:8}}>
                              <button className="btn btn-p" onClick={()=>openEmail(lead)}>{Ic.mail} E-Mail schreiben</button>
                              <button className="btn btn-g btn-sm">Zum Kontakt</button>
                            </div>
                          </div>
                        );
                      })}
                    </div>

                    <div className="sec">
                      <div className="sec-title">{Ic.list} Offene Follow-ups</div>
                      {tasks.map(task => {
                        const c = task.contacts || {};
                        const over  = new Date(task.due_date) < new Date();
                        const today = task.due_date === todayISO();
                        return (
                          <div key={task.id} className={`task-card ${over?"overdue":today?"today":""}`}>
                            <div style={{flex:1}}>
                              <div className="tc-name">{c.firstname} {c.lastname}</div>
                              <div className="tc-co">{c.company}</div>
                              <div className="tc-note">{task.draft_content}</div>
                            </div>
                            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:6}}>
                              <span className={`badge ${over?"b-red":today?"b-amber":"b-gray"}`}>
                                {over?`${daysDiff(task.due_date)} Tage überfällig`:today?"Heute fällig":fmtDate(task.due_date)}
                              </span>
                              <button className="btn btn-g btn-sm" onClick={()=>{setEmailCtx({contacts:c});setTab("email");}}>
                                {Ic.mail} E-Mail
                              </button>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </>}

                  {/* EMAIL COPILOT */}
                  {tab==="email" && <>
                    <div style={{marginBottom:20}}>
                      <div className="pg-title">Email Copilot</div>
                      <div className="pg-sub">Personalisierte Erstmails in unter 3 Minuten</div>
                    </div>
                    <div className="copilot-grid">
                      <div className="panel">
                        <div className="panel-title">{Ic.spark} Kontext & Einstellungen</div>
                        {emailCtx && (
                          <div className="ctx-card">
                            <div className="ctx-lbl">Lead-Kontext aus Kalkulator</div>
                            <div className="ctx-val">{emailCtx.contacts?.firstname} {emailCtx.contacts?.lastname} · {emailCtx.contacts?.company}</div>
                            {emailCtx.roi_eur_jahr && <div className="ctx-sub">ROI {eur(emailCtx.roi_eur_jahr)}/Jahr · {emailCtx.amortisation_monate} Mo. Amortisation · Größe {emailCtx.bauteilgroesse}</div>}
                          </div>
                        )}
                        <div className="f-grp">
                          <label className="f-lbl">Empfänger</label>
                          <select className="f-sel" value={selectedCId}
                            onChange={e => {
                              const cid = e.target.value;
                              setSelectedCId(cid);
                              if (!cid) { setEmailCtx(null); return; }
                              const contact = contacts.find(c => c.id === cid);
                              // Find latest wizard submission for this contact
                              const sub = allSubs.find(s => s.contact_id === cid);
                              setEmailCtx({ contacts: contact, ...(sub || {}) });
                              setEDraft("");
                            }}>
                            <option value="">— Kontakt auswählen —</option>
                            {contacts.map(c => (
                              <option key={c.id} value={c.id}>
                                {c.firstname} {c.lastname} · {c.company}
                              </option>
                            ))}
                          </select>
                        </div>
                        <div className="f-grp">
                          <label className="f-lbl">Sprache</label>
                          <div className="toggle-grp">
                            {[["de","Deutsch"],["en","English"],["fr","Français"]].map(([v,l])=>(
                              <button key={v} className={`tog-btn ${eLang===v?"on":""}`} onClick={()=>setELang(v)}>{l}</button>
                            ))}
                          </div>
                        </div>
                        <div className="f-grp">
                          <label className="f-lbl">Tonalität</label>
                          <div className="toggle-grp">
                            <button className={`tog-btn ${eTone==="formal"?"on":""}`} onClick={()=>setETone("formal")}>Formal</button>
                            <button className={`tog-btn ${eTone==="direkt"?"on":""}`} onClick={()=>setETone("direkt")}>Direkt</button>
                          </div>
                        </div>
                        <div className="f-grp">
                          <label className="f-lbl">Hinweise (optional)</label>
                          <textarea className="f-ta" value={eNotes} onChange={e=>setENotes(e.target.value)}
                            placeholder="Z.B. 'JEC-Treffen erwähnen' oder 'Referenz Airbus einbauen'…"/>
                        </div>
                        <button className="btn btn-p btn-full" onClick={generateEmail} disabled={eLoading}>
                          {eLoading?<><div className="spin"/>Generiere…</>:<>{Ic.spark} Entwurf generieren</>}
                        </button>
                      </div>
                      <div className="panel">
                        <div className="panel-title">{Ic.mail} E-Mail Entwurf</div>
                        <div className="draft-box">
                          {eLoading
                            ? <div style={{display:"flex",alignItems:"center",gap:10,color:"var(--tx3)"}}><div className="spin dark"/>Claude schreibt…</div>
                            : eDraft ? eDraft
                            : <span className="draft-empty">{emailCtx?`Kontext für ${emailCtx.contacts?.firstname} ${emailCtx.contacts?.lastname} geladen.\n\nAuf "Entwurf generieren" klicken.`:"Lead aus 'Mein Tag' öffnen oder Empfänger eingeben."}</span>
                          }
                        </div>
                        {eDraft && (
                          <div className="draft-actions">
                            <button className="btn btn-p btn-sm" onClick={copyDraft}>{eCopied?<>{Ic.check} Kopiert!</>:<>{Ic.copy} Kopieren</>}</button>
                            <button className="btn btn-g btn-sm" onClick={generateEmail}>{Ic.refresh} Nochmal</button>
                          </div>
                        )}
                      </div>
                    </div>
                  </>}

                  {/* INTERAKTION LOGGEN */}
                  {tab==="log" && <>
                    <div style={{marginBottom:20}}>
                      <div className="pg-title">Interaktion loggen</div>
                      <div className="pg-sub">Rohe Notizen rein — strukturierte Daten raus</div>
                    </div>
                    <div className="copilot-grid">
                      <div className="panel">
                        <div className="panel-title">{Ic.log} Notizen eingeben</div>
                        <div className="f-grp">
                          <label className="f-lbl">Kontakt</label>
                          <input className="f-input" placeholder="Name oder Unternehmen…" value={logCtact} onChange={e=>setLogCtact(e.target.value)}/>
                        </div>
                        <div className="f-grp">
                          <label className="f-lbl">Notiz — frei, alles okay</label>
                          <textarea className="f-ta" style={{minHeight:160}} value={logText} onChange={e=>setLogText(e.target.value)}
                            placeholder="Z.B. 'Hatte heute Call mit Klaus Weber BMW. Er will Angebot für 12 FlexGrid L bis Ende Monat. Budget ca. 50k. Nächster Schritt: Spezifikation schicken. Follow-up in 5 Tagen.'"/>
                        </div>
                        <button className="btn btn-p btn-full" onClick={analyzeInteraction} disabled={logLoad||!logText.trim()}>
                          {logLoad?<><div className="spin"/>Analysiere…</>:<>{Ic.spark} Analysieren</>}
                        </button>
                      </div>
                      <div className="panel">
                        <div className="panel-title">{Ic.check} Extrahierte Daten</div>
                        {logRes ? <>
                          <div style={{marginBottom:14}}>
                            <div className="f-lbl" style={{marginBottom:5}}>Zusammenfassung</div>
                            <div style={{fontSize:".875rem",lineHeight:1.65,color:"var(--tx)"}}>{logRes.summary}</div>
                          </div>
                          {logRes.todos?.length>0 && <div style={{marginBottom:14}}>
                            <div className="f-lbl" style={{marginBottom:5}}>To-Dos</div>
                            {logRes.todos.map((t,i)=><div key={i} className="log-result-item"><span style={{color:"var(--blue)"}}>•</span>{t}</div>)}
                          </div>}
                          {logRes.next_steps?.length>0 && <div style={{marginBottom:16}}>
                            <div className="f-lbl" style={{marginBottom:5}}>Nächste Schritte</div>
                            {logRes.next_steps.map((s,i)=><div key={i} className="log-result-item"><span style={{color:"var(--green)"}}>→</span>{s}</div>)}
                          </div>}
                          <button className="btn btn-p btn-sm">In Supabase speichern</button>
                        </> : <div style={{color:"var(--tx3)",fontSize:".86rem",fontStyle:"italic"}}>Zusammenfassung, To-Dos und nächste Schritte erscheinen hier nach der Analyse.</div>}
                      </div>
                    </div>
                  </>}

                  {/* PIPELINE */}
                  {tab==="pipeline" && <>
                    <div style={{marginBottom:20}}>
                      <div className="pg-title">Pipeline</div>
                      <div className="pg-sub">
                        {pipeLeads.length + deals.length} Einträge
                        {deals.length > 0 ? ` · ${eur(pipeVal)} Dealwert` : ""}
                      </div>
                    </div>
                    <div className="pipeline">

                      {/* ── Lead Spalte (aus wizard_submissions) ── */}
                      <div>
                        <div className="pl-col-hdr">
                          <div className="pl-title">Lead</div>
                          <div className="pl-count">{pipeLeads.length} {pipeLeads.length===1?"Lead":"Leads"}</div>
                        </div>
                        {pipeLeads.map(lead => {
                          const c = lead.contacts || {};
                          const isAdvancing = advancing === lead.id;
                          return (
                            <div key={lead.id} className="deal-card">
                              <div className="deal-co">{c.company || "–"}</div>
                              <div className="deal-contact">{c.firstname} {c.lastname}</div>
                              {lead.roi_eur_jahr && <div className="deal-val">{eur(lead.roi_eur_jahr)}<span style={{fontSize:".7rem",fontWeight:400,color:"var(--tx3)",marginLeft:4}}>ROI/Jahr</span></div>}
                              <div className="deal-act">{relTime(lead.created_at)}</div>
                              {lead.bauteilgroesse && <div className="deal-note">FlexGrid {lead.bauteilgroesse} · {lead.spannpunkte} SP · {lead.ruestzeit_min} min</div>}
                              <button className="btn-advance" onClick={()=>promoteWizardLead(lead)} disabled={isAdvancing}>
                                {isAdvancing ? <><div className="spin dark" style={{width:11,height:11,borderWidth:1.5}}/>Wird verschoben…</> : <>Qualifiziert →</>}
                              </button>
                            </div>
                          );
                        })}
                        {pipeLeads.length===0 && <div className="pl-empty">Keine neuen Leads</div>}
                      </div>

                      {/* ── Qualifiziert / Angebot / Abschluss (aus deals) ── */}
                      {[{id:"qualifiziert",label:"Qualifiziert",next:"Angebot"},{id:"angebot",label:"Angebot",next:"Abschluss"},{id:"abschluss",label:"Abschluss",next:null}].map(({id,label,next})=>{
                        const col = deals.filter(d=>d.stage===id);
                        return (
                          <div key={id}>
                            <div className="pl-col-hdr">
                              <div className="pl-title">{label}</div>
                              <div className="pl-count">{col.length} Deal{col.length!==1?"s":""}{col.length>0 ? ` · ${eur(col.reduce((a,d)=>a+(d.value_eur||0),0))}` : ""}</div>
                            </div>
                            {col.map(deal=>{
                              const c = deal.contacts || {};
                              const isAdvancing = advancing === deal.id;
                              return (
                                <div key={deal.id} className="deal-card">
                                  <div className="deal-co">{c.company}</div>
                                  <div className="deal-contact">{c.firstname} {c.lastname}</div>
                                  {deal.value_eur && <div className="deal-val">{eur(deal.value_eur)}</div>}
                                  <div className="deal-act">Letzte Aktivität: {relTime(deal.last_activity)}</div>
                                  {deal.notes && <div className="deal-note">{deal.notes}</div>}
                                  {next && <button className="btn-advance" onClick={()=>promoteDeal(deal)} disabled={isAdvancing}>
                                    {isAdvancing ? <><div className="spin dark" style={{width:11,height:11,borderWidth:1.5}}/>Wird verschoben…</> : <>{next} →</>}
                                  </button>}
                                  {!next && <div className="deal-won">✓ Gewonnen</div>}
                                </div>
                              );
                            })}
                            {col.length===0 && <div className="pl-empty">Leer</div>}
                          </div>
                        );
                      })}
                    </div>
                  </>}
                </>)}
              </main>
            </div>
          </div>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<SalesOS/>);
  </script>
</body>
</html>
