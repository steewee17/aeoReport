<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Converter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --surface2: #1f1f1f;
    --border: #2a2a2a;
    --border-hover: #444;
    --text: #e8e8e0;
    --text-muted: #7a7a72;
    --text-dim: #4a4a45;
    --accent: #7c6af5;
    --accent-hover: #9585f8;
    --accent-dim: rgba(124,106,245,0.12);
    --accent-border: rgba(124,106,245,0.35);
    --green: #3ecf8e;
    --green-bg: rgba(62,207,142,0.1);
    --red: #f87171;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
    --radius: 6px;
    --sidebar: 220px;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* SIDEBAR */
  aside {
    width: var(--sidebar);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 20px 16px;
    gap: 24px;
    flex-shrink: 0;
  }

  .sidebar-logo {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    text-transform: uppercase;
    font-weight: 500;
  }

  .sidebar-section label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    text-transform: uppercase;
    display: block;
    margin-bottom: 10px;
  }

  .format-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
  }

  .format-btn {
    padding: 8px 4px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    border-radius: var(--radius);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
  }

  .format-btn:hover { border-color: var(--border-hover); color: var(--text); }
  .format-btn.active {
    background: var(--accent-dim);
    border-color: var(--accent-border);
    color: var(--accent-hover);
  }

  .format-btn.unsupported {
    opacity: 0.3;
    cursor: not-allowed;
    position: relative;
  }
  .format-btn.unsupported::after {
    content: 'n/a';
    position: absolute;
    top: 2px; right: 4px;
    font-size: 8px;
    color: var(--red);
    letter-spacing: 0.05em;
    font-family: var(--mono);
  }
  .format-btn.unsupported {
    opacity: 0.35;
    cursor: not-allowed;
    position: relative;
  }
  .format-btn.unsupported::after {
    content: 'n/a';
    position: absolute;
    top: 2px; right: 4px;
    font-size: 8px;
    color: var(--red);
    letter-spacing: 0.05em;
  }

  .quality-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  .quality-row span:first-child {
    font-size: 13px;
    color: var(--text-muted);
  }

  .quality-val {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent-hover);
    font-weight: 500;
  }

  input[type=range] {
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
    height: 3px;
    background: var(--border-hover);
    border-radius: 2px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-runnable-track { border-radius: 2px; }

  .range-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
  }
  .range-labels span {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .sidebar-stats {
    margin-top: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .stat-row span:first-child {
    font-size: 11px;
    color: var(--text-dim);
  }
  .stat-val {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
  }
  .stat-val.green { color: var(--green); }

  .btn-download {
    width: 100%;
    padding: 10px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #fff;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn-download:hover { background: var(--accent-hover); }
  .btn-download:disabled { opacity: 0.3; cursor: default; }
  .btn-download svg { width: 14px; height: 14px; }

  /* MAIN */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .header-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    font-weight: 500;
  }

  .count-badge {
    background: var(--accent-dim);
    border: 1px solid var(--accent-border);
    color: var(--accent-hover);
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 20px;
    display: none;
  }
  .count-badge.visible { display: inline-block; }

  .header-meta {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .format-tag {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 4px 10px;
    border: 1px solid var(--accent-border);
    border-radius: 20px;
    color: var(--accent-hover);
    background: var(--accent-dim);
  }

  .quality-tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
  }

  /* DROP ZONE */
  .drop-section {
    padding: 20px 24px 0;
    flex-shrink: 0;
  }

  .drop-zone {
    border: 1.5px dashed var(--border-hover);
    border-radius: 8px;
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    min-height: 140px;
  }

  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-dim);
  }

  .drop-icon {
    width: 40px; height: 40px;
    border: 1px solid var(--border-hover);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--accent);
    transition: all 0.2s;
  }
  .drop-zone:hover .drop-icon, .drop-zone.drag-over .drop-icon {
    border-color: var(--accent-border);
    background: var(--accent-dim);
  }

  .drop-zone h3 {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
  }

  .drop-zone p {
    font-size: 12px;
    color: var(--text-dim);
    font-family: var(--mono);
  }

  .btn-browse {
    padding: 8px 18px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #fff;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    margin-top: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.15s;
  }
  .btn-browse:hover { background: var(--accent-hover); }

  input[type=file] { display: none; }

  /* RESULTS */
  .results-section {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
  }

  .results-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .results-header h4 {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-family: var(--mono);
  }

  .results-count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
  }

  .image-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 12px;
  }

  .image-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .image-card:hover { border-color: var(--border-hover); }

  .image-card img {
    width: 100%;
    height: 120px;
    object-fit: cover;
    display: block;
    background: var(--surface2);
  }

  .card-info {
    padding: 10px 12px;
  }

  .card-name {
    font-size: 12px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }

  .card-sizes {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .card-sizes .arrow { margin: 0 4px; }

  .card-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 20px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 500;
    background: var(--green-bg);
    color: var(--green);
  }

  .card-badge.red {
    background: rgba(248,113,113,0.1);
    color: var(--red);
  }

  .card-dl-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 28px; height: 28px;
    background: rgba(13,13,13,0.8);
    border: 1px solid var(--border-hover);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s;
    color: var(--text);
  }
  .image-card:hover .card-dl-btn { opacity: 1; }
  .card-dl-btn:hover { background: var(--accent-dim); border-color: var(--accent-border); }
  .card-dl-btn svg { width: 13px; height: 13px; }

  /* Processing spinner */
  .card-loading {
    position: absolute; inset: 0;
    background: rgba(13,13,13,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border-hover);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Empty state */
  .empty-hint {
    text-align: center;
    padding: 24px 0;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  /* Codec info bar */
  .codec-bar {
    margin-top: 12px;
    padding: 8px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    margin: 0 24px 14px;
  }
  .codec-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
  }
  .codec-text {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }
  .codec-text strong { color: var(--text-muted); font-weight: 500; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-hover); border-radius: 2px; }
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside>
  <div class="sidebar-logo">⬡ Codec&nbsp;Lab</div>

  <div class="sidebar-section">
    <label>Output Format</label>
    <div class="format-grid">
      <button class="format-btn active" data-fmt="webp">WebP</button>
      <button class="format-btn" data-fmt="avif">AVIF</button>
      <button class="format-btn" data-fmt="jpeg">JPEG</button>
      <button class="format-btn" data-fmt="png">PNG</button>
    </div>
  </div>

  <div class="sidebar-section">
    <label>Quality</label>
    <div class="quality-row">
      <span>Compression</span>
      <span class="quality-val" id="qualityVal">85%</span>
    </div>
    <input type="range" id="qualitySlider" min="1" max="100" value="85" step="1">
    <div class="range-labels">
      <span>Low</span><span>Mid</span><span>High</span>
    </div>
  </div>

  <div class="sidebar-stats" id="statsPanel" style="opacity:0.3">
    <label style="font-family:var(--mono);font-size:10px;letter-spacing:0.1em;color:var(--text-dim);text-transform:uppercase;display:block;margin-bottom:6px;">Session Stats</label>
    <div class="stat-row">
      <span>Files converted</span>
      <span class="stat-val" id="statCount">0</span>
    </div>
    <div class="stat-row">
      <span>Original size</span>
      <span class="stat-val" id="statOrig">—</span>
    </div>
    <div class="stat-row">
      <span>Saved</span>
      <span class="stat-val green" id="statSaved">—</span>
    </div>
  </div>

  <button class="btn-download" id="btnDownloadAll" disabled>
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M8 2v8m-3-3 3 3 3-3M2 12h12"/>
    </svg>
    Download All
  </button>
</aside>

<!-- MAIN -->
<main>
  <header>
    <div class="header-title">
      Image Converter
      <span class="count-badge" id="countBadge">0</span>
    </div>
    <div class="header-meta">
      <span class="format-tag" id="fmtTag">WEBP</span>
      <span class="quality-tag">Quality: <span id="qualityTagVal">85%</span></span>
    </div>
  </header>

  <!-- Drop Zone -->
  <div class="drop-section">
    <div class="drop-zone" id="dropZone">
      <div class="drop-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M10 3v10M6 9l4-4 4 4M4 15h12"/>
        </svg>
      </div>
      <h3>Drop images here</h3>
      <p>PNG · JPG · GIF · BMP · TIFF · WebP</p>
      <button class="btn-browse" id="btnBrowse">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="4" width="12" height="9" rx="1.5"/>
          <path d="M5 4V3a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v1"/>
        </svg>
        Browse Files
      </button>
      <input type="file" id="fileInput" accept="image/*" multiple>
    </div>
  </div>

  <!-- Codec info -->
  <div class="codec-bar" id="codecBar" style="display:none">
    <div class="codec-dot"></div>
    <div class="codec-text" id="codecText">—</div>
  </div>

  <!-- Results -->
  <div class="results-section" id="resultsSection">
    <div class="empty-hint" id="emptyHint">Converted images appear here after dropping files above.</div>
    <div id="resultsHeader" style="display:none" class="results-header">
      <h4>Converted Images</h4>
      <span class="results-count" id="resultsCount">0 images</span>
    </div>
    <div class="image-grid" id="imageGrid"></div>
  </div>
</main>

<script>
const state = {
  format: 'webp',
  quality: 85,
  results: [],
  totalOrigBytes: 0,
  totalConvBytes: 0
};

const CODEC_INFO = {
  webp: 'Canvas → <strong>image/webp</strong> · Codec: <strong>libwebp</strong> (Google) · Lossy DCT compression',
  avif: 'Canvas → <strong>image/avif</strong> · Codec: <strong>AV1 / libaom</strong> · Intra-frame encoding',
  jpeg: 'Canvas → <strong>image/jpeg</strong> · Standard JFIF · DCT baseline',
  png:  'Canvas → <strong>image/png</strong> · Lossless DEFLATE · No quality param'
};

const MIME = {
  webp: 'image/webp',
  avif: 'image/avif',
  jpeg: 'image/jpeg',
  png:  'image/png'
};

const EXT = { webp: 'webp', avif: 'avif', jpeg: 'jpg', png: 'png' };

// Elements
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const imageGrid = document.getElementById('imageGrid');
const emptyHint = document.getElementById('emptyHint');
const resultsHeader = document.getElementById('resultsHeader');
const resultsCount = document.getElementById('resultsCount');
const countBadge = document.getElementById('countBadge');
const fmtTag = document.getElementById('fmtTag');
const qualityTagVal = document.getElementById('qualityTagVal');
const qualityVal = document.getElementById('qualityVal');
const qualitySlider = document.getElementById('qualitySlider');
const btnDownloadAll = document.getElementById('btnDownloadAll');
const statsPanel = document.getElementById('statsPanel');
const statCount = document.getElementById('statCount');
const statOrig = document.getElementById('statOrig');
const statSaved = document.getElementById('statSaved');
const codecBar = document.getElementById('codecBar');
const codecText = document.getElementById('codecText');

// Detect which formats canvas.toBlob actually supports in this browser
async function checkFormatSupport(fmt) {
  const c = document.createElement('canvas');
  c.width = 1; c.height = 1;
  c.getContext('2d').fillRect(0, 0, 1, 1);
  return new Promise(resolve => {
    c.toBlob(blob => resolve(blob !== null && blob.size > 0), MIME[fmt], 0.9);
  });
}

// Magic-byte signatures to verify actual codec used
const MAGIC = {
  webp: [0x52, 0x49, 0x46, 0x46],   // RIFF at offset 0 (WebP container)
  avif: [0x66, 0x74, 0x79, 0x70],   // ftyp at offset 4
  jpeg: [0xFF, 0xD8, 0xFF],
  png:  [0x89, 0x50, 0x4E, 0x47]
};

async function verifyBlobMime(blob, expectedFmt) {
  const buf = await blob.slice(0, 12).arrayBuffer();
  const bytes = new Uint8Array(buf);
  if (expectedFmt === 'avif') {
    return bytes[4] === 0x66 && bytes[5] === 0x74 && bytes[6] === 0x79 && bytes[7] === 0x70;
  }
  const sig = MAGIC[expectedFmt];
  if (!sig) return true;
  return sig.every((b, i) => bytes[i] === b);
}

// Check support on load and mark unsupported buttons
(async () => {
  for (const fmt of ['webp', 'avif', 'jpeg', 'png']) {
    const ok = await checkFormatSupport(fmt);
    if (!ok) {
      const btn = document.querySelector(`.format-btn[data-fmt="${fmt}"]`);
      if (btn) btn.classList.add('unsupported');
    }
  }
})();

// Format buttons
document.querySelectorAll('.format-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (btn.classList.contains('unsupported')) return;
    document.querySelectorAll('.format-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.format = btn.dataset.fmt;
    fmtTag.textContent = state.format.toUpperCase();
    updateCodecBar();
  });
});

qualitySlider.addEventListener('input', () => {
  state.quality = parseInt(qualitySlider.value);
  qualityVal.textContent = state.quality + '%';
  qualityTagVal.textContent = state.quality + '%';
});

function updateCodecBar() {
  if (state.results.length > 0) {
    codecBar.style.display = 'flex';
    codecText.innerHTML = CODEC_INFO[state.format];
  }
}

// Drag & drop
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('drag-over');
  processFiles([...e.dataTransfer.files].filter(f => f.type.startsWith('image/')));
});

document.getElementById('btnBrowse').addEventListener('click', e => {
  e.stopPropagation();
  fileInput.click();
});
dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  processFiles([...fileInput.files]);
  fileInput.value = '';
});

function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
  return (b / (1024 * 1024)).toFixed(2) + ' MB';
}

async function convertImage(file, format, quality) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext('2d');
      if (format === 'png') {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      } else {
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
      ctx.drawImage(img, 0, 0);
      URL.revokeObjectURL(url);
      const mime = MIME[format];
      const q = format === 'png' ? undefined : quality / 100;
      canvas.toBlob(async blob => {
        if (!blob) {
          reject(new Error(`${MIME[format]} not supported by this browser — try WebP or JPEG`));
          return;
        }
        const mimeOk = await verifyBlobMime(blob, format);
        if (!mimeOk) {
          reject(new Error(`Browser silently fell back to a different codec instead of ${format.toUpperCase()} — this browser doesn't support it via canvas`));
          return;
        }
        resolve(blob);
      }, mime, q);
    };
    img.onerror = () => reject(new Error('Could not load image'));
    img.src = url;
  });
}

async function processFiles(files) {
  if (!files.length) return;

  emptyHint.style.display = 'none';
  resultsHeader.style.display = 'flex';
  codecBar.style.display = 'flex';
  codecText.innerHTML = CODEC_INFO[state.format];

  for (const file of files) {
    const card = createPlaceholderCard(file.name);
    imageGrid.prepend(card.el);

    try {
      const blob = await convertImage(file, state.format, state.quality);
      const objUrl = URL.createObjectURL(blob);

      const result = {
        name: file.name.replace(/\.[^.]+$/, '') + '.' + EXT[state.format],
        origName: file.name,
        origBytes: file.size,
        convBytes: blob.size,
        blob,
        objUrl,
        format: state.format
      };
      state.results.push(result);
      state.totalOrigBytes += file.size;
      state.totalConvBytes += blob.size;

      updateCard(card, result);
      updateStats();
    } catch (err) {
      card.el.querySelector('.card-loading').innerHTML =
        `<span style="font-size:10px;color:var(--red);font-family:var(--mono);padding:8px;text-align:center">${err.message}</span>`;
    }
  }
}

function createPlaceholderCard(name) {
  const el = document.createElement('div');
  el.className = 'image-card';
  el.innerHTML = `
    <div style="width:100%;height:120px;background:var(--surface2)"></div>
    <div class="card-info">
      <div class="card-name">${name}</div>
      <div class="card-sizes" style="color:var(--text-dim)">Processing…</div>
    </div>
    <div class="card-loading"><div class="spinner"></div></div>
  `;
  return { el };
}

function updateCard(card, result) {
  const pct = ((result.origBytes - result.convBytes) / result.origBytes * 100);
  const isSmaller = pct > 0;
  const pctStr = (isSmaller ? '↓ ' : '↑ ') + Math.abs(pct).toFixed(1) + '% ' + (isSmaller ? 'smaller' : 'larger');

  card.el.innerHTML = `
    <img src="${result.objUrl}" alt="${result.name}" loading="lazy">
    <div class="card-info">
      <div class="card-name">${result.name}</div>
      <div class="card-sizes">
        ${formatBytes(result.origBytes)}<span class="arrow">→</span>${formatBytes(result.convBytes)}
      </div>
      <span class="card-badge ${isSmaller ? '' : 'red'}">${pctStr}</span>
    </div>
    <button class="card-dl-btn" title="Download">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M8 2v8m-3-3 3 3 3-3M2 12h12"/>
      </svg>
    </button>
  `;

  card.el.querySelector('.card-dl-btn').addEventListener('click', e => {
    e.stopPropagation();
    downloadBlob(result.blob, result.name);
  });
}

function updateStats() {
  const saved = state.totalOrigBytes - state.totalConvBytes;
  const pct = (saved / state.totalOrigBytes * 100).toFixed(1);

  statsPanel.style.opacity = '1';
  statCount.textContent = state.results.length;
  statOrig.textContent = formatBytes(state.totalOrigBytes);
  statSaved.textContent = formatBytes(Math.abs(saved)) + (saved > 0 ? ' (' + pct + '%)' : '');

  countBadge.textContent = state.results.length;
  countBadge.classList.add('visible');
  resultsCount.textContent = state.results.length + ' image' + (state.results.length !== 1 ? 's' : '');

  btnDownloadAll.disabled = false;
}

function downloadBlob(blob, name) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 3000);
}

btnDownloadAll.addEventListener('click', async () => {
  if (!state.results.length) return;

  if (state.results.length === 1) {
    const r = state.results[0];
    downloadBlob(r.blob, r.name);
    return;
  }

  // Multiple files → download as ZIP using JSZip
  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
  script.onload = async () => {
    const zip = new JSZip();
    for (const r of state.results) {
      zip.file(r.name, r.blob);
    }
    const content = await zip.generateAsync({ type: 'blob' });
    downloadBlob(content, 'converted-images.zip');
  };
  document.head.appendChild(script);
});
</script>
</body>
